<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Case study</title>
<meta name="theme-color" content="#121417" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/style.css" />
</head>
<body>

  <div class="pg-transition" id="pgTransition" aria-hidden="true"></div>

  <div class="cursor" id="cursorFollower" aria-hidden="true">
    <svg class="cursor__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>
  </div>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <div class="nav__id">
        <a href="/" class="nav__name" data-name></a>
        <span class="nav__role" data-role-title></span>
      </div>
      <div class="nav__links">
        <a href="index.html#work" class="nav__link--desktop">Work</a>
        <a href="index.html#services" class="nav__link--desktop">About</a>
        <a href="mailto:hello@otmane.design" class="nav__cta">Get in touch</a>
        <button class="nav__burger" id="navBurger" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          <span class="nav__burger-box"><span></span><span></span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu__links">
      <a href="index.html#work">Work</a>
      <a href="index.html#services">About</a>
    </div>
    <a href="mailto:hello@otmane.design" class="mobile-menu__cta">Get in touch</a>
    <div class="mobile-menu__foot">
      <a href="mailto:hello@otmane.design">hello@otmane.design</a>
      <span>Marrakech, Morocco</span>
    </div>
  </div>

  <main id="caseContent"></main>

  <footer class="contact">
    <div class="contact__wrap">
      <span class="contact__label" data-reveal>Let's work together</span>
      <a href="#" class="contact__email" data-contact-email data-reveal></a>
      <div class="contact__row" data-reveal>
        <div class="contact__meta">
          <span data-contact-credit></span>
          <div class="contact__location">
            <span data-contact-city></span>
            <svg class="contact__clock-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ebe1b0"/><stop offset="100%" stop-color="#aea8fe"/></linearGradient></defs>
              <circle cx="10" cy="10" r="8" stroke="url(#cg)" stroke-width="1.5"/>
              <path d="M10 6v4l3 2" stroke="url(#cg)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span data-contact-time></span>
          </div>
        </div>
        <div class="contact__socials" data-contact-socials></div>
      </div>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
  const esc = (s='') => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const abs = (p='') => p.startsWith('http')||p.startsWith('/') ? p : '/'+p;

  async function loadJSON(path){
    const r = await fetch(path,{cache:'no-store'});
    if(!r.ok) throw new Error('Failed: '+path);
    return r.json();
  }

  function renderChrome(site){
    document.querySelectorAll('[data-name]').forEach(el=>el.textContent=site.name||'');
    document.querySelectorAll('[data-role-title]').forEach(el=>el.textContent=site.role_title||'');

    const contactEmail = document.querySelector('[data-contact-email]');
    if(contactEmail){ contactEmail.href='mailto:hello@otmane.design'; contactEmail.textContent='hello@otmane.design'; }

    const credit = document.querySelector('[data-contact-credit]');
    if(credit) credit.textContent = 'Designed and built by ' + (site.name||'');

    const cityEl = document.querySelector('[data-contact-city]');
    if(cityEl && Array.isArray(site.meta_grid)){
      const based = site.meta_grid.find(m=>(m.label||'').toLowerCase()==='based');
      if(cityEl) cityEl.textContent = based ? (based.value||'').split(',')[0] : '';
    }

    const timeEl = document.querySelector('[data-contact-time]');
    function updateClock(){
      if(!timeEl) return;
      timeEl.textContent = new Intl.DateTimeFormat('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Africa/Casablanca'}).format(new Date());
    }
    updateClock();
    setInterval(updateClock, 30000);

    const SOCIAL_ICONS = {
      'linkedin': '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 8.75h4v11.5H3zM9 8.75h3.8v1.57h.05A4.17 4.17 0 0 1 16.6 8.4c4 0 4.75 2.63 4.75 6.05v6.8H17.6v-6.03c0-1.44-.03-3.29-2-3.29s-2.32 1.57-2.32 3.19v6.13H9z"/></svg>',
      'behance': '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M9.04 5.5c.77 0 1.48.06 2.12.2.64.13 1.2.35 1.64.67.45.31.79.72 1.03 1.23.24.5.36 1.12.36 1.86 0 .8-.18 1.47-.54 2a3.5 3.5 0 0 1-1.54 1.24c.93.27 1.63.74 2.09 1.42.46.67.69 1.48.69 2.42 0 .82-.17 1.52-.5 2.1a4.1 4.1 0 0 1-1.34 1.43c-.56.37-1.2.63-1.91.79-.7.16-1.42.24-2.14.24H2V5.5h7.04zm-.4 6.22c.63 0 1.15-.15 1.55-.45.4-.3.6-.77.6-1.41 0-.35-.06-.64-.19-.88a1.5 1.5 0 0 0-.52-.56 2.1 2.1 0 0 0-.76-.3 4.1 4.1 0 0 0-.9-.09H5v3.69h3.64zm.2 6.52c.34 0 .67-.04.97-.1.31-.07.58-.18.81-.33.24-.16.43-.37.57-.63.14-.26.21-.59.21-.98 0-.78-.22-1.34-.66-1.67-.43-.33-1.01-.5-1.72-.5H5v4.2h3.84zm9.54-1.37c.42.41.97.61 1.72.61.54 0 1-.13 1.39-.39.39-.26.63-.54.72-.83h2.64c-.42 1.3-1.07 2.23-1.95 2.78-.87.55-1.93.83-3.16.83-.86 0-1.63-.14-2.32-.41a5.04 5.04 0 0 1-1.74-1.16 5.23 5.23 0 0 1-1.1-1.78 6.4 6.4 0 0 1-.39-2.26c0-.8.14-1.56.41-2.25.28-.7.67-1.3 1.17-1.8a5.3 5.3 0 0 1 1.77-1.18c.68-.28 1.44-.42 2.27-.42.93 0 1.74.18 2.44.54.7.36 1.27.84 1.72 1.44.44.6.76 1.28.94 2.04.19.77.25 1.57.19 2.41h-7.88c.04.85.3 1.53.72 1.94zm3.02-4.98c-.34-.37-.85-.56-1.52-.56-.44 0-.82.08-1.12.23-.3.15-.55.34-.73.57-.19.22-.32.46-.4.72a3 3 0 0 0-.13.73h4.56c-.1-.73-.32-1.32-.66-1.69z"/></svg>',
      'dribbble': '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm6.6 4.84a8.35 8.35 0 0 1 1.9 4.71c-.28-.06-3.06-.62-5.86-.27-.06-.16-.13-.32-.2-.48-.18-.43-.38-.86-.59-1.27 3.13-1.28 4.56-3.11 4.75-3.69zM12 3.67c2.16 0 4.14.79 5.67 2.08-.17.55-1.47 2.26-4.48 3.38A38.5 38.5 0 0 0 9.34 3.9 8.38 8.38 0 0 1 12 3.67zM7.6 4.67a36.6 36.6 0 0 1 3.79 5.18C8.38 10.73 5.5 10.75 5.19 10.75h-.05A8.38 8.38 0 0 1 7.6 4.67zM3.67 12l.03-.3c.29.01 3.73.08 6.88-.96.19.38.38.76.55 1.14-.1.03-.19.06-.28.1-3.26 1.05-5 4.15-5.14 4.4A8.35 8.35 0 0 1 3.67 12zm8.33 8.33c-1.97 0-3.79-.68-5.22-1.81.1-.24 1.41-2.97 4.97-4.2.02 0 .03-.01.05-.01a33.5 33.5 0 0 1 1.72 5.82 8.3 8.3 0 0 1-1.52.2zm3.38-.87A34.9 34.9 0 0 0 13.83 14c2.6-.41 4.88.27 5.16.35a8.37 8.37 0 0 1-3.61 5.11z"/></svg>'
    };

    const socWrap = document.querySelector('[data-contact-socials]');
    if(socWrap && Array.isArray(site.socials)){
      socWrap.innerHTML = site.socials.map(l=>{
        const key=(l.label||'').toLowerCase();
        const icon=SOCIAL_ICONS[key]||'';
        return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+icon+esc(l.label)+'</a>';
      }).join('');
    }
  }

  function metaFact(label, value){
    if(!value) return '';
    return '<div class="cs-fact">'
      + '<dt class="cs-fact__label">'+esc(label)+'</dt>'
      + '<dd class="cs-fact__value">'+esc(value)+'</dd>'
      + '</div>';
  }

  function renderCase(p, allProjects, site){
    document.title = (p.title||'Case study')+' — '+(site.name||'');
    const main = document.getElementById('caseContent');

    // facts dl
    const facts = [
      metaFact('Scope', p.scope || p.tag),
      metaFact('Role', p.role),
      metaFact('Client', p.client || p.title),
      metaFact('Year', p.year || (p.meta||'').match(/\d{4}[-–]\d{4}|\d{4}/)?.[0])
    ].filter(Boolean).join('');

    // body prose
    const bodyHTML = p.body ? marked.parse(p.body) : '';

    // more projects
    const others = allProjects.filter(x=>x.slug!==p.slug).slice(0,3);
    const moreCards = others.map(op=>'<a class="wcard" href="work.html#'+esc(op.slug||'')+'" data-reveal>'
      + '<div class="wcard__img"><img src="'+esc(abs(op.image||''))+'" alt="'+esc(op.title||'')+'" loading="lazy"/></div>'
      + '<div class="wcard__info">'
      +   '<div class="wcard__left"><span class="wcard__title">'+esc(op.title||'')+'</span>'
      +     '<span class="wcard__discipline">'+esc(op.tag||'')+'</span></div>'
      +   '<span class="wcard__year">'+esc(op.year||'')+'</span>'
      + '</div></a>'
    ).join('');

    // build all gallery items — supports wide, pair, and before/after slider
    function buildGalleryItems(gallery){
      const items = [];
      let i = 0;
      while(i < gallery.length){
        const img = gallery[i];
        // Before/after slider — triggered by type:'slider' on the item
        if(img.type === 'slider' && img.before && img.after){
          const id = 'slider-'+i;
          items.push(
            '<div class="cs-slider" data-reveal id="'+id+'">'
            + '<div class="cs-slider__track">'
            +   '<div class="cs-slider__after"><img src="'+esc(abs(img.after))+'" alt="After" loading="lazy" /></div>'
            +   '<div class="cs-slider__before"><img src="'+esc(abs(img.before))+'" alt="Before" loading="lazy" /></div>'
            +   '<div class="cs-slider__divider">'
            +     '<div class="cs-slider__line"></div>'
            +     '<div class="cs-slider__handle">'
            +       '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20"><path d="M8 5L3 12L8 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 5L21 12L16 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
            +     '</div>'
            +   '</div>'
            + '</div>'
            + '<div class="cs-slider__labels">'
            +   '<span class="cs-slider__label">Before</span>'
            +   '<span class="cs-slider__label">After</span>'
            + '</div>'
            + '</div>'
          );
          i++;
        } else if(img.wide){
          items.push('<div class="cs-img cs-img--full" data-reveal><img src="'+esc(abs(img.src))+'" alt="'+esc(img.alt||'')+'" loading="lazy" /></div>');
          i++;
        } else {
          const next = gallery[i+1] && !gallery[i+1].wide && gallery[i+1].type !== 'slider' ? gallery[i+1] : null;
          if(next){
            items.push('<div class="cs-img-grid" data-reveal>'
              + '<div class="cs-img"><img src="'+esc(abs(img.src))+'" alt="'+esc(img.alt||'')+'" loading="lazy" /></div>'
              + '<div class="cs-img"><img src="'+esc(abs(next.src))+'" alt="'+esc(next.alt||'')+'" loading="lazy" /></div>'
              + '</div>');
            i += 2;
          } else {
            items.push('<div class="cs-img cs-img--full" data-reveal><img src="'+esc(abs(img.src))+'" alt="'+esc(img.alt||'')+'" loading="lazy" /></div>');
            i++;
          }
        }
      }
      return items;
    }

    const gallery = Array.isArray(p.gallery) && p.gallery.length ? p.gallery : (p.image ? [{src:p.image,alt:p.title,wide:true}] : []);
    const galleryItems = buildGalleryItems(gallery);
    const coverHTML = galleryItems.length ? '<section class="cs-cover-wrap">'+galleryItems[0]+'</section>' : '';
    const restGalleryHTML = galleryItems.length > 1 ? '<div class="cs-gallery">'+galleryItems.slice(1).join('')+'</div>' : '';

    main.innerHTML =
      '<section class="cs-hero" data-reveal>'
      +   '<div class="cs-hero__wrap">'
      +     '<a class="cs-back" href="work.html">← Work</a>'
      +     '<p class="cs-category">'+esc(p.tag||p.scope||'Project')+'</p>'
      +     '<div class="cs-title-row">'
      +       '<h1 class="cs-title">'+esc(p.summary||p.title||'')+'</h1>'
      +       (p.liveUrl ? '<a class="cs-live-link" href="'+esc(p.liveUrl)+'" target="_blank" rel="noopener">Visit live website <span class="cs-live-arrow">↗</span></a>' : '')
      +     '</div>'
      +     (facts ? '<dl class="cs-facts">'+facts+'</dl>' : '')
      +   '</div>'
      + '</section>'
      + coverHTML
      + (bodyHTML ? '<section class="cs-body"><div class="cs-body__wrap"><div class="prose" data-reveal>'+bodyHTML+'</div></div></section>' : '')
      + (restGalleryHTML ? '<section class="cs-body"><div class="cs-body__wrap">'+restGalleryHTML+'</div></section>' : '')
      + (moreCards ? '<section class="cs-more"><div class="cs-more__wrap"><h2 class="cs-section-heading" data-reveal>More projects</h2><div class="cs-more__list">'+moreCards+'</div></div></section>' : '');

    // Init sliders after DOM is set
    initSliders();
  }

  function renderNotFound(){
    document.title = 'Not found';
    document.getElementById('caseContent').innerHTML =
      '<section class="cs-hero"><div class="cs-hero__wrap">'
      + '<a class="cs-back" href="work.html">← Work</a>'
      + '<h1 class="cs-title">Project not found</h1>'
      + '<p class="cs-summary"><a href="index.html">Back to home</a></p>'
      + '</div></section>';
  }

  function setupNav(){
    const nav = document.getElementById('nav');
    const onScroll = ()=>nav.classList.toggle('scrolled', window.scrollY>8);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
  }

  function setupReveal(){
    const io = new IntersectionObserver(entries=>{
      const groups = new Map();
      entries.forEach(e=>{
        if(e.isIntersecting){
          const parent = e.target.parentElement;
          const count = groups.get(parent)||0;
          e.target.style.transitionDelay = (count*90)+'ms';
          groups.set(parent, count+1);
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, {threshold:.06});
    document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));
  }

  function setupCursor(){
    if(!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    const cursor = document.getElementById('cursorFollower');
    if(!cursor) return;
    let raf=null, mx=0, my=0;
    document.addEventListener('mousemove', e=>{
      mx=e.clientX; my=e.clientY;
      cursor.style.opacity='1';
      if(raf) return;
      raf=requestAnimationFrame(()=>{
        cursor.style.transform='translate3d('+mx+'px,'+my+'px,0) translate(-50%,-50%)';
        raf=null;
      });
    });
    document.addEventListener('mouseleave',()=>{ cursor.style.opacity='0'; });
    document.querySelectorAll('.wcard').forEach(el=>{
      el.addEventListener('mouseenter',()=>cursor.classList.add('is-project'));
      el.addEventListener('mouseleave',()=>cursor.classList.remove('is-project'));
    });
    document.querySelectorAll('a:not(.wcard):not(.nav__cta):not(.mobile-menu__cta), button:not(.slider__btn)').forEach(el=>{
      el.addEventListener('mouseenter',()=>cursor.classList.add('is-link'));
      el.addEventListener('mouseleave',()=>cursor.classList.remove('is-link'));
    });
  }

  function setupMobileMenu(){
    const burger = document.getElementById('navBurger');
    const menu = document.getElementById('mobileMenu');
    if(!burger||!menu) return;
    function close(){
      burger.classList.remove('is-open');
      menu.classList.remove('is-open');
      burger.setAttribute('aria-expanded','false');
      menu.setAttribute('aria-hidden','true');
      document.body.classList.remove('menu-open');
    }
    burger.addEventListener('click',()=>{
      burger.classList.contains('is-open') ? close() : (()=>{
        burger.classList.add('is-open');
        menu.classList.add('is-open');
        burger.setAttribute('aria-expanded','true');
        menu.setAttribute('aria-hidden','false');
        document.body.classList.add('menu-open');
      })();
    });
    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',close));
    window.addEventListener('keydown',e=>{ if(e.key==='Escape') close(); });
  }

  function initSliders(){
    document.querySelectorAll('.cs-slider').forEach(slider => {
      const track = slider.querySelector('.cs-slider__track');
      const beforePane = slider.querySelector('.cs-slider__before');
      const beforeImg = beforePane?.querySelector('img');
      const divider = slider.querySelector('.cs-slider__divider');
      if(!track||!beforePane||!divider) return;

      function setPos(x){
        const rect = track.getBoundingClientRect();
        const pct = Math.min(100, Math.max(0, (x - rect.left) / rect.width * 100));
        // Clip the before pane
        beforePane.style.width = pct + '%';
        // Stretch before image to track width so it doesn't squash
        if(beforeImg) beforeImg.style.width = rect.width + 'px';
        divider.style.left = pct + '%';
      }

      // Init at 50%
      setPos(track.getBoundingClientRect().left + track.getBoundingClientRect().width * 0.5);

      let dragging = false;
      divider.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
      track.addEventListener('mousedown', e => { dragging = true; setPos(e.clientX); });
      window.addEventListener('mousemove', e => { if(dragging) setPos(e.clientX); });
      window.addEventListener('mouseup', () => { dragging = false; });
      divider.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, {passive:false});
      track.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, {passive:true});
      window.addEventListener('touchmove', e => { if(dragging) setPos(e.touches[0].clientX); }, {passive:true});
      window.addEventListener('touchend', () => { dragging = false; });

      // Recompute on resize
      window.addEventListener('resize', () => {
        setPos(track.getBoundingClientRect().left + track.getBoundingClientRect().width * parseFloat(beforePane.style.width) / 100);
      }, {passive:true});
    });
  }

  window.addEventListener('hashchange',()=>location.reload());

  (async function init(){
    try{
      const hashSlug = decodeURIComponent((location.hash||'').replace(/^#/,''));
      const pathSlug = location.pathname.split('/').filter(Boolean).pop();
      const slug = hashSlug || (pathSlug !== 'work.html' ? pathSlug : '');
      const [site, proj] = await Promise.all([loadJSON('/data/site.json'), loadJSON('/data/projects.json')]);
      renderChrome(site);
      const list = proj.projects||[];
      const p = list.find(x=>x.slug===slug);
      if(!p) renderNotFound();
      else renderCase(p, list, site);
    }catch(err){
      console.error(err); renderNotFound();
    }finally{
      document.body.classList.add('ready');
      setupNav();
      setupReveal();
      setupCursor();
      setupMobileMenu();
    }
  })();
</script>

<script>
(function(){
  const overlay = document.getElementById('pgTransition');
  if(!overlay) return;

  // Always ensure overlay never blocks clicks unless actively animating in
  function unlock(){ overlay.style.pointerEvents = ''; }

  function transitionTo(href){
    overlay.style.pointerEvents = 'all';
    overlay.classList.remove('is-leaving');
    void overlay.offsetWidth;
    overlay.classList.add('is-entering');
    // Navigate when entering animation ends — animationend is the source of truth
    overlay.addEventListener('animationend', function onEnd(){
      overlay.removeEventListener('animationend', onEnd);
      window.location.href = href;
    });
    // Safety net: if animationend never fires, navigate after 1s
    setTimeout(()=>{ window.location.href = href; }, 1000);
  }

  document.addEventListener('click', function(e){
    const a = e.target.closest('a');
    if(!a) return;
    const href = a.getAttribute('href');
    if(!href||a.target==='_blank'||href.startsWith('mailto:')||href.startsWith('http')||href.startsWith('#')) return;
    const base = href.split('#')[0];
    if(base===''||base===window.location.pathname.split('/').pop()) return;
    e.preventDefault();
    transitionTo(href);
  });

  // On page load: force overlay to fully visible, then animate out
  overlay.classList.remove('is-entering');
  overlay.classList.remove('is-leaving');
  overlay.style.transform = 'translateX(0%)';
  overlay.style.transition = 'none';
  overlay.style.animation = 'none';
  void overlay.offsetWidth;

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      overlay.style.transform = '';
      overlay.style.transition = '';
      overlay.style.animation = '';
      void overlay.offsetWidth;
      overlay.classList.add('is-leaving');
      // After leaving animation ends, fully unlock
      overlay.addEventListener('animationend', function onLeave(){
        overlay.removeEventListener('animationend', onLeave);
        overlay.classList.remove('is-leaving');
        unlock();
      });
      // Safety net
      setTimeout(()=>{
        overlay.classList.remove('is-leaving');
        unlock();
      }, 1000);
    });
  });
})();
</script>
