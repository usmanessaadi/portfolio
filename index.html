<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<meta name="description" content="Product designer & engineer." />
<meta name="theme-color" content="#fafcfd" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Manrope:wght@400;450;500;600;700;800&family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <div class="nav__id">
        <span class="nav__name" data-name></span>
        <span class="nav__role" data-role-title></span>
      </div>
      <div class="nav__links">
        <a href="#work">Work</a>
        <a href="#experience">About</a>
        <a href="#" class="nav__cta" data-nav-cta>Get in touch</a>
      </div>
    </div>
  </nav>

  <header class="hero" id="top">
    <div class="hero__inner">
      <div class="hero__col">
        <h1 class="display" data-reveal data-headline></h1>
        <div class="hero__meta" data-reveal data-meta></div>
      </div>
      <div class="hero__photo" data-reveal>
        <img src="assets/img/portrait.webp" alt="Portrait of Otmane Essaadi" loading="eager" />
      </div>
    </div>
  </header>

  <main>
    <section class="section" id="experience" data-reveal>
      <div class="wrap">
        <div class="section__head">
          <span class="section__label">Experience</span>
          <span class="section__note">Most recent first</span>
        </div>
        <div data-experience></div>
      </div>
    </section>

    <section class="section" id="work" data-reveal>
      <div class="wrap">
        <div class="section__head">
          <span class="section__label">Selected work</span>
          <span class="section__note" data-work-range></span>
        </div>
        <div class="grid" data-projects></div>
      </div>
    </section>
  </main>

  <footer class="foot">
    <div class="wrap">
      <div class="foot__grid">
        <div class="foot__big" data-reveal>Let's build<br><span>something good.</span></div>
        <div class="foot__links" data-reveal data-socials></div>
      </div>
      <div class="foot__legal">Designed + built by <span data-name>&nbsp;</span> · © <span data-year></span></div>
    </div>
  </footer>

<script>
  const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>';
  const esc = (s='') => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  async function loadJSON(path){
    const r = await fetch(path, {cache:'no-store'});
    if(!r.ok) throw new Error('Failed to load '+path);
    return r.json();
  }

  function renderSite(s){
    document.querySelectorAll('[data-name]').forEach(el => el.textContent = s.name || 'Your Name');
    document.title = (s.name ? s.name + ' — ' : '') + (s.role_title || 'Product Designer + Engineer');
    document.querySelectorAll('[data-role-title]').forEach(el => el.textContent = s.role_title || '');
    document.querySelector('[data-year]').textContent = new Date().getFullYear();

    const navCta = document.querySelector('[data-nav-cta]');
    if(navCta && s.email) navCta.href = 'mailto:' + s.email;

   const h = document.querySelector('[data-headline]');
    if(h){
      const pre  = esc(s.headline_pre || '');
      const city = s.headline_city ? '<em>'+esc(s.headline_city)+'</em>' : '';
      const lines = Array.isArray(s.headline_lines) ? s.headline_lines.map(esc) : [];
      h.innerHTML = pre + city + '.' + (lines.length ? '<br>' + lines.join('<br>') : '');
    }

    const meta = document.querySelector('[data-meta]');
    if(meta && Array.isArray(s.meta_grid)){
      meta.innerHTML = s.meta_grid.map(m =>
        '<div class="hero__meta-item">'
        + '<span class="hero__meta-label">'+esc(m.label || '')+'</span>'
        + '<span class="hero__meta-value">'+esc(m.value || '')+'</span>'
        + '</div>'
      ).join('');
    }

    const res = document.querySelector('[data-role="resume"]');
    if(res){ if(s.resume_url){ res.href = s.resume_url; } else { res.remove(); } }

    const soc = document.querySelector('[data-socials]');
    if(soc){
      const links = (s.socials || []).map(l =>
        '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label)+' '+ARROW+'</a>'
      );
      if(s.email) links.push('<a href="mailto:'+esc(s.email)+'">Email '+ARROW+'</a>');
      soc.innerHTML = links.join('');
    }
  }

  function renderExperience(roles){
    const wrap = document.querySelector('[data-experience]');
    if(!wrap) return;
    wrap.innerHTML = roles.map(r => {
      const tag = r.url ? 'a' : 'div';
      const href = r.url ? ' href="'+esc(r.url)+'" target="_blank" rel="noopener"' : '';
      return '<'+tag+' class="xp__row"'+href+'>'
        + '<span class="xp__year">'+esc(r.year)+'</span>'
        + '<span class="xp__co">'+esc(r.company)+'</span>'
        + '<span class="xp__role"><span class="r-text" data-hide>'+esc(r.role)+'</span>'
        + '<span class="xp__arrow">'+ARROW+'</span></span>'
        + '</'+tag+'>';
    }).join('');
  }

  function renderProjects(list){
    const grid = document.querySelector('[data-projects]');
    if(!grid) return;
    grid.innerHTML = list.map(p =>
      '<a class="proj" href="work.html#'+encodeURIComponent(p.slug || '')+'">'
      + '<span class="proj__tag">'+esc(p.tag || 'Project')+'</span>'
      + '<div class="proj__body">'
      +   '<h3 class="proj__title">'+esc(p.title || '')+'</h3>'
      +   '<div class="proj__foot">'
      +     '<span class="proj__meta">'+esc(p.meta || '')+'</span>'
      +     '<span class="proj__go">'+ARROW+'</span>'
      +   '</div>'
      + '</div>'
      + '</a>'
    ).join('');

    // derive year range for the section note
    const years = list.map(p => (p.meta||'').match(/\d{4}/)).filter(Boolean).map(m => +m[0]);
    const note = document.querySelector('[data-work-range]');
    if(note && years.length){
      const lo = Math.min(...years), hi = Math.max(...years);
      note.textContent = lo === hi ? String(hi) : lo + ' — ' + hi;
    }
  }

  function setupNav(){
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
  }

  function setupReveal(){
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if(e.isIntersecting){
          e.target.style.transitionDelay = e.target.dataset.delay || (i*60)+'ms';
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, {threshold:.12, rootMargin:'0px 0px -8% 0px'});
    document.querySelectorAll('[data-reveal]').forEach((el, i) => {
      if(el.closest('.hero')) el.dataset.delay = (i*110)+'ms';
      io.observe(el);
    });
  }

  (async function init(){
    try{
      const [site, exp, proj] = await Promise.all([
        loadJSON('data/site.json'),
        loadJSON('data/experience.json'),
        loadJSON('data/projects.json'),
      ]);
      renderSite(site);
      renderExperience(exp.roles || []);
      renderProjects((proj.projects || []).filter(p => p.featured !== false));
    }catch(err){
      console.error(err);
    }finally{
      document.body.classList.add('ready');
      setupNav();
      setupReveal();
    }
  })();
</script>
</body>
</html>>
