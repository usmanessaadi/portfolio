<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<meta name="description" content="Product designer & engineer." />
<meta name="theme-color" content="#121417" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <div class="site-fx" aria-hidden="true">
    <div class="fx__grain"></div>
    <div class="fx__glow" id="siteGlow"></div>
  </div>

  <div class="cursor" id="cursorFollower" aria-hidden="true">
    <svg class="cursor__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>
  </div>

  <header class="hero" id="top">
    <nav class="nav" id="nav">
      <div class="nav__inner">
        <div class="nav__id">
          <span class="nav__name" data-name></span>
          <span class="nav__role" data-role-title></span>
        </div>
        <div class="nav__links">
          <a href="#work" class="nav__link--desktop">Work</a>
          <a href="#experience" class="nav__link--desktop">About</a>
          <a href="#" class="nav__cta" data-nav-cta>Get in touch</a>
          <button class="nav__burger" id="navBurger" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
            <span class="nav__burger-box">
              <span></span><span></span>
            </span>
          </button>
        </div>
      </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
      <div class="mobile-menu__links">
        <a href="#work">Work</a>
        <a href="#experience">About</a>
      </div>
      <a href="#" class="mobile-menu__cta" data-mobile-cta>Get in touch</a>
      <div class="mobile-menu__foot">
        <a href="#" data-mobile-email></a>
        <span data-mobile-location></span>
      </div>
    </div>

    <div class="hero__inner">
      <h1 class="display" data-reveal data-headline></h1>
      <div class="hero__bottom">
        <div class="hero__meta" data-reveal data-meta></div>
        <div class="hero__photo" data-reveal>
          <img src="assets/img/portrait.webp" alt="Portrait of Otmane Essaadi" loading="eager" />
        </div>
      </div>
    </div>
  </header>

  <section class="slider">
    <div class="slider__frame" id="sliderFrame">
      <img class="slider__img is-active" src="assets/img/slides/01.webp" alt="" />
      <img class="slider__img" src="assets/img/slides/02.webp" alt="" />
      <img class="slider__img" src="assets/img/slides/03.webp" alt="" />
      <img class="slider__img" src="assets/img/slides/04.webp" alt="" />
      <button class="slider__btn" id="sliderToggle" type="button" aria-label="Pause slideshow" aria-pressed="false">
        <svg class="slider__ring" viewBox="0 0 44 44"><circle cx="22" cy="22" r="20"/></svg>
        <svg class="slider__icon slider__icon--pause" viewBox="0 0 10 12"><rect x="0" y="0" width="3" height="12"/><rect x="7" y="0" width="3" height="12"/></svg>
        <svg class="slider__icon slider__icon--play" viewBox="0 0 10 12"><path d="M0 0 L10 6 L0 12 Z"/></svg>
      </button>
    </div>
  </section>

  <section class="work" id="work">
    <div class="work__wrap">
      <h2 class="work__heading">Selected work</h2>
      <div class="work__cols">
        <div class="work__col" data-work-col-a></div>
        <div class="work__col work__col--offset" data-work-col-b></div>
      </div>
    </div>
  </section>

  <section class="services" id="services">
    <div class="services__wrap">
      <h2 class="services__heading" data-reveal>What I do</h2>
      <div class="services__grid" data-services></div>
      <div class="services__cta">
        <p class="services__cta-text" data-reveal>Have a project in mind? Let's talk.</p>
        <a href="#" class="services__cta-btn" data-services-cta data-reveal>Get in touch
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>
        </a>
      </div>
    </div>
  </section>

  <footer class="contact">
    <div class="contact__wrap">
      <span class="contact__label" data-reveal>Let's work together</span>
      <a href="#" class="contact__email" data-contact-email data-reveal></a>
      <div class="contact__row" data-reveal>
        <div class="contact__meta">
          <span data-contact-credit></span>
          <span data-contact-location></span>
        </div>
        <div class="contact__socials" data-contact-socials></div>
      </div>
    </div>
  </footer>

<script>
  const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>';
  const esc = (s='') => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  async function loadJSON(path){
    const r = await fetch(path, {cache:'no-store'});
    if(!r.ok) throw new Error('Failed to load '+path);
    return r.json();
  }

  function renderSite(s){
    document.querySelectorAll('[data-name]').forEach(el => el.textContent = s.name || 'Your Name');
    document.title = (s.name ? s.name + ' — ' : '') + (s.role_title || 'Product Designer + Engineer');
    document.querySelectorAll('[data-role-title]').forEach(el => el.textContent = s.role_title || '');
    const yearEl = document.querySelector('[data-year]');
    if(yearEl) yearEl.textContent = new Date().getFullYear();

    const navCta = document.querySelector('[data-nav-cta]');
    if(navCta && s.email) navCta.href = 'mailto:' + s.email;
    const mobileCta = document.querySelector('[data-mobile-cta]');
    if(mobileCta && s.email) mobileCta.href = 'mailto:' + s.email;
    const mobileEmail = document.querySelector('[data-mobile-email]');
    if(mobileEmail && s.email){ mobileEmail.href = 'mailto:' + s.email; mobileEmail.textContent = s.email; }
    const mobileLocation = document.querySelector('[data-mobile-location]');
    if(mobileLocation && Array.isArray(s.meta_grid)){
      const based = s.meta_grid.find(m => (m.label || '').toLowerCase() === 'based');
      if(based) mobileLocation.textContent = based.value || '';
    }

    const h = document.querySelector('[data-headline]');
    if(h){
      const pre  = esc(s.headline_pre || '');
      const city = s.headline_city ? '<em>'+esc(s.headline_city)+'</em>' : '';
      const lines = Array.isArray(s.headline_lines) ? s.headline_lines.map(esc) : [];
      h.innerHTML = pre + city + '.' + (lines.length ? '<br>' + lines.join('<br>') : '');
    }

    const meta = document.querySelector('[data-meta]');
    if(meta && Array.isArray(s.meta_grid)){
      meta.innerHTML = s.meta_grid.map(m =>
        '<div class="hero__meta-item">'
        + '<span class="hero__meta-label">'+esc(m.label || '')+'</span>'
        + '<span class="hero__meta-value">'+esc(m.value || '')+'</span>'
        + '</div>'
      ).join('');
    }

    const contactEmail = document.querySelector('[data-contact-email]');
    if(contactEmail && s.email){ contactEmail.href = 'mailto:' + s.email; contactEmail.textContent = s.email; }

    const credit = document.querySelector('[data-contact-credit]');
    if(credit) credit.textContent = 'Designed and built by ' + (s.name || '');

    const locEl = document.querySelector('[data-contact-location]');
    if(locEl && Array.isArray(s.meta_grid)){
      const based = s.meta_grid.find(m => (m.label || '').toLowerCase() === 'based');
      const city = based ? (based.value || '').split(',')[0] : '';
      function updateClock(){
        const time = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Africa/Casablanca' }).format(new Date());
        locEl.textContent = city ? (city + ', ' + time) : time;
      }
      updateClock();
      setInterval(updateClock, 30000);
    }

    const socWrap = document.querySelector('[data-contact-socials]');
    if(socWrap && Array.isArray(s.socials)){
      socWrap.innerHTML = s.socials.map(l =>
        '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label)+'</a>'
      ).join('');
    }

    const servicesCta = document.querySelector('[data-services-cta]');
    if(servicesCta && s.email) servicesCta.href = 'mailto:' + s.email;
  }

  function renderServices(list){
    const grid = document.querySelector('[data-services]');
    if(!grid) return;
    grid.innerHTML = list.map((sv, i) =>
      '<div class="services__item" data-reveal>'
      + '<span class="services__num">'+String(i + 1).padStart(2, '0')+'</span>'
      + '<h3 class="services__title">'+esc(sv.title || '')+'</h3>'
      + '<p class="services__desc">'+esc(sv.description || '')+'</p>'
      + '</div>'
    ).join('');
  }

  function renderWork(list){
    const colA = document.querySelector('[data-work-col-a]');
    const colB = document.querySelector('[data-work-col-b]');
    if(!colA || !colB) return;

    const card = (p) => {
      const tag = p.url ? 'a' : 'div';
      const href = p.url ? ' href="'+esc(p.url)+'"' : '';
      const titleHTML = esc(p.title || '') + (p.tag ? ' <span class="work__badge">'+esc(p.tag)+'</span>' : '');
      return '<'+tag+' class="work__card" data-reveal'+href+'>'
        + '<div class="work__figure"><img src="'+esc(p.image || '')+'" alt="'+esc(p.title || '')+'" loading="lazy" /></div>'
        + '<div class="work__caption">'
        +   '<div class="work__row">'
        +     '<span class="work__title">'+titleHTML+'</span>'
        +     '<span class="work__year">'+esc(p.year || '')+'</span>'
        +   '</div>'
        +   '<p class="work__desc">'+esc(p.description || '')+'</p>'
        + '</div>'
        + '</'+tag+'>';
    };

    const mid = Math.ceil(list.length / 2);
    colA.innerHTML = list.slice(0, mid).map(card).join('');
    colB.innerHTML = list.slice(mid).map(card).join('');
  }

  function setupFX(){
    const siteFx = document.querySelector('.site-fx');
    if(!siteFx) return;
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    let raf = null;
    window.addEventListener('pointermove', (e) => {
      siteFx.classList.add('is-active');
      if(raf) return;
      raf = requestAnimationFrame(() => {
        siteFx.style.setProperty('--x', e.clientX + 'px');
        siteFx.style.setProperty('--y', e.clientY + 'px');
        raf = null;
      });
    });
    document.addEventListener('mouseleave', () => siteFx.classList.remove('is-active'));
  }

  function setupCursor(){
    if(!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    const cursor = document.getElementById('cursorFollower');
    if(!cursor) return;

    let raf = null, mx = 0, my = 0;
    document.addEventListener('mousemove', (e) => {
      mx = e.clientX; my = e.clientY;
      cursor.style.opacity = '1';
      if(raf) return;
      raf = requestAnimationFrame(() => {
        cursor.style.transform = 'translate3d('+mx+'px,'+my+'px,0) translate(-50%,-50%)';
        raf = null;
      });
    });
    document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });

    function bind(selector, cls){
      document.querySelectorAll(selector).forEach((el) => {
        el.addEventListener('mouseenter', () => cursor.classList.add(cls));
        el.addEventListener('mouseleave', () => cursor.classList.remove(cls));
      });
    }
    bind('.work__card', 'is-project');
    bind('a:not(.work__card):not(.nav__cta):not(.mobile-menu__cta), button:not(.slider__btn)', 'is-link');
  }

  function setupSlider(){
    const frame = document.getElementById('sliderFrame');
    if(!frame) return;
    const imgs = Array.from(frame.querySelectorAll('.slider__img'));
    const btn = document.getElementById('sliderToggle');
    const ring = frame.querySelector('.slider__ring');
    if(!imgs.length || !btn || !ring) return;

    const DURATION = 4000;
    let idx = 0, timer = null, paused = false;

    function restartRing(){
      ring.classList.remove('is-animating');
      void ring.offsetWidth;
      ring.classList.add('is-animating');
    }
    function goTo(next){
      imgs[idx].classList.remove('is-active');
      idx = next;
      imgs[idx].classList.add('is-active');
    }
    function tick(){
      if(paused) return;
      goTo((idx + 1) % imgs.length);
      restartRing();
      timer = setTimeout(tick, DURATION);
    }

    restartRing();
    timer = setTimeout(tick, DURATION);

    btn.addEventListener('click', () => {
      paused = !paused;
      btn.classList.toggle('is-paused', paused);
      btn.setAttribute('aria-pressed', String(paused));
      btn.setAttribute('aria-label', paused ? 'Play slideshow' : 'Pause slideshow');
      if(paused){
        clearTimeout(timer);
      } else {
        restartRing();
        timer = setTimeout(tick, DURATION);
      }
    });
  }

  function setupMobileMenu(){
    const burger = document.getElementById('navBurger');
    const menu = document.getElementById('mobileMenu');
    if(!burger || !menu) return;

    function closeMenu(){
      burger.classList.remove('is-open');
      menu.classList.remove('is-open');
      burger.setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('menu-open');
    }
    function openMenu(){
      burger.classList.add('is-open');
      menu.classList.add('is-open');
      burger.setAttribute('aria-expanded', 'true');
      menu.setAttribute('aria-hidden', 'false');
      document.body.classList.add('menu-open');
    }

    burger.addEventListener('click', () => {
      burger.classList.contains('is-open') ? closeMenu() : openMenu();
    });
    menu.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeMenu(); });
  }

  function setupNav(){
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
  }

  function setupReveal(){
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if(e.isIntersecting){
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, {threshold:.12, rootMargin:'0px 0px -8% 0px'});

    const groups = new Map();
    document.querySelectorAll('[data-reveal]').forEach((el) => {
      const parent = el.parentElement;
      const count = groups.get(parent) || 0;
      el.style.transitionDelay = (count * 90) + 'ms';
      groups.set(parent, count + 1);
      io.observe(el);
    });
  }

  (async function init(){
    try{
      const [site, services, proj] = await Promise.all([
        loadJSON('data/site.json'),
        loadJSON('data/services.json'),
        loadJSON('data/projects.json'),
      ]);
      renderSite(site);
      renderServices(services.services || []);
      renderWork(proj.projects || []);
    }catch(err){
      console.error(err);
    }finally{
      document.body.classList.add('ready');
      setupNav();
      setupReveal();
      setupSlider();
      setupFX();
      setupCursor();
      setupMobileMenu();
    }
  })();
</script>
</body>
</html>
